{% extends "base.html" %}
{% block title %}{{ post.title }} — Sarah{% endblock %}
{% block content %}

<section class="section narrow">
  <p class="eyebrow reveal">$ cat content/blog/{{ post.slug }}.md</p>
  <h1 class="reveal" style="--delay:60ms">{{ post.title }}</h1>
  <p class="post-meta reveal" style="--delay:100ms">
    {{ post.date }}
    {% for t in post.tags %}<span class="tag">{{ t }}</span>{% endfor %}
  </p>

  <div class="prose reveal" style="--delay:140ms">
    {{ post.html | safe }}
  </div>

  <a class="link reveal" style="--delay:180ms" href="{{ url_for('blog') }}">← back to changelog</a>
</section>

{% endblock %}
